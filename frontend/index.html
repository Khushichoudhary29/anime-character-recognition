<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Character Recognition</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            color: white;
            min-height: 100vh;
            padding: 30px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: rgba(30, 41, 59, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.35);
        }

        h1 {
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #cbd5e1;
            margin-bottom: 25px;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border-radius: 10px;
            border: none;
            background: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1d4ed8;
        }

        .upload-box {
            width: 100%;
            padding: 35px;
            margin-top: 15px;
            border: 2px dashed #60a5fa;
            border-radius: 14px;
            text-align: center;
            cursor: pointer;
            color: #cbd5e1;
            background: #1e293b;
            transition: 0.3s;
        }

        .upload-box:hover {
            background: #334155;
        }

        .dashboard {
            display: flex;
            gap: 25px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .preview-panel,
        .result-panel {
            flex: 1;
            min-width: 320px;
            background: #334155;
            padding: 20px;
            border-radius: 15px;
        }

        .panel-title {
            margin-bottom: 15px;
            font-size: 20px;
            font-weight: bold;
        }

        #preview {
            width: 100%;
            max-height: 420px;
            object-fit: contain;
            border-radius: 12px;
            background: #0f172a;
            display: none;
        }

        .insight-card {
            padding: 15px;
            background: #1e40af;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .prediction-card {
            margin-bottom: 15px;
            padding: 15px;
            background: #475569;
            border-radius: 12px;
        }

        .bar-container {
            width: 100%;
            height: 12px;
            background: #1e293b;
            border-radius: 8px;
            margin-top: 8px;
            overflow: hidden;
        }

        .bar {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border-radius: 8px;
            transition: width 0.6s ease;
        }

        .loading {
            color: #93c5fd;
            text-align: center;
        }

        .spinner {
            width: 35px;
            height: 35px;
            border: 4px solid #334155;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .history-panel {
            margin-top: 30px;
            background: #334155;
            padding: 20px;
            border-radius: 15px;
        }

        .history-item {
            padding: 12px;
            margin-top: 10px;
            background: #475569;
            border-radius: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Anime Character Recognition</h1>
    <p class="subtitle">Upload an anime image to view ranked predictions</p>

    <div class="upload-box" id="uploadBox">
        Drag & Drop Anime Image Here
        <br><br>
        <span>or click to upload</span>
        <input type="file" id="imageInput" accept="image/*" hidden>
    </div>

    <button onclick="predictCharacter()">Predict Character</button>

    <div class="dashboard">
        <div class="preview-panel">
            <div class="panel-title">Uploaded Image</div>
            <img id="preview" alt="Image Preview">
        </div>

        <div class="result-panel">
            <div class="panel-title">Prediction Results</div>
            <div id="resultBox">Upload image and click predict</div>
        </div>
    </div>

    <div class="history-panel">
        <h2>Recent Predictions</h2>
        <div id="historyBox">No predictions yet</div>
    </div>
</div>

<script>
    const imageInput = document.getElementById("imageInput");
    const uploadBox = document.getElementById("uploadBox");
    const preview = document.getElementById("preview");
    const resultBox = document.getElementById("resultBox");
    const historyBox = document.getElementById("historyBox");

    let predictionHistory = [];

    uploadBox.addEventListener("click", () => {
        imageInput.click();
    });

    uploadBox.addEventListener("dragover", (e) => {
        e.preventDefault();
    });

    uploadBox.addEventListener("drop", (e) => {
        e.preventDefault();
        imageInput.files = e.dataTransfer.files;
        showPreview();
    });

    imageInput.addEventListener("change", showPreview);

    function showPreview() {
        const file = imageInput.files[0];
        if (file) {
            preview.src = URL.createObjectURL(file);
            preview.style.display = "block";
        }
    }

    function getInsight(value) {
        if (value >= 80) return "Very High Confidence";
        if (value >= 60) return "High Confidence";
        if (value >= 40) return "Possible Match";
        return "Low Confidence – Try another image";
    }

    function updateHistory() {
        if (predictionHistory.length === 0) {
            historyBox.innerHTML = "No predictions yet";
            return;
        }

        historyBox.innerHTML = predictionHistory.map(item => `
            <div class="history-item">
                <strong>${item.character}</strong> - ${item.confidence}%<br>
                <small>${item.time}</small>
            </div>
        `).join("");
    }

    async function predictCharacter() {
        const file = imageInput.files[0];

        if (!file) {
            alert("Please select an image first.");
            return;
        }

        const formData = new FormData();
        formData.append("file", file);

        resultBox.innerHTML = `
            <div class="spinner"></div>
            <p class="loading">Analyzing image...</p>
        `;

        try {
            const response = await fetch("/predict", {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            const topResult = data.top_predictions[0];
            const insight = getInsight(topResult.confidence);

            let html = `
                <div class="insight-card">
                    <strong>Best Match:</strong> ${topResult.character}<br>
                    <strong>Status:</strong> ${insight}
                </div>
            `;

            data.top_predictions.forEach((pred, index) => {
                html += `
                    <div class="prediction-card">
                        <strong>#${index + 1} ${pred.character}</strong>
                        <p>Confidence: ${pred.confidence}%</p>
                        <div class="bar-container">
                            <div class="bar" style="width:${pred.confidence}%"></div>
                        </div>
                    </div>
                `;
            });

            resultBox.innerHTML = html;

            predictionHistory.unshift({
                character: topResult.character,
                confidence: topResult.confidence,
                time: new Date().toLocaleTimeString()
            });

            if (predictionHistory.length > 5) {
                predictionHistory.pop();
            }

            updateHistory();

        } catch (error) {
            console.error(error);
            resultBox.innerHTML = "Frontend API connection error";
        }
    }
</script>

</body>
</html>
