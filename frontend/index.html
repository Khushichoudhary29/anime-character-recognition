<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Anime Character Recognition</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.35);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            text-align: center;
            color: #cbd5e1;
            margin-bottom: 25px;
        }

        input, button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
        }

        input {
            background: white;
            color: black;
        }

        button {
            background: #2563eb;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1d4ed8;
        }

        img {
            width: 100%;
            margin-top: 20px;
            border-radius: 15px;
            display: none;
            max-height: 350px;
            object-fit: contain;
            background: #0f172a;
        }

        #resultBox {
            margin-top: 25px;
        }

        .prediction-card {
            background: #334155;
            padding: 18px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        .prediction-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .rank {
            font-size: 18px;
            font-weight: bold;
        }

        .name {
            font-size: 18px;
        }

        .confidence-text {
            color: #cbd5e1;
            margin-bottom: 8px;
        }

        .bar-container {
            width: 100%;
            height: 12px;
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
        }

        .bar {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border-radius: 10px;
            transition: width 0.8s ease;
        }

        .loading {
            text-align: center;
            font-size: 18px;
            color: #93c5fd;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Anime Character Recognition</h1>
    <p class="subtitle">Upload image and view top 3 ranked predictions</p>

    <input type="file" id="imageInput" accept="image/*">
    <button onclick="predictCharacter()">Predict Character</button>

    <img id="preview" alt="Image Preview">
    <div id="resultBox"></div>
</div>

<script>
    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");
    const resultBox = document.getElementById("resultBox");

    imageInput.addEventListener("change", function () {
        const file = this.files[0];
        if (file) {
            preview.src = URL.createObjectURL(file);
            preview.style.display = "block";
        }
    });

    async function predictCharacter() {
        const file = imageInput.files[0];

        if (!file) {
            alert("Please select an image first.");
            return;
        }

        const formData = new FormData();
        formData.append("file", file);

        resultBox.innerHTML = '<div class="loading">Predicting...</div>';

        try {
            const response = await fetch("/predict", {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            let html = `<h2 style="margin-bottom:20px;">Top 3 Predictions</h2>`;

            data.top_predictions.forEach((pred, index) => {
                html += `
                    <div class="prediction-card">
                        <div class="prediction-header">
                            <span class="rank">#${index + 1}</span>
                            <span class="name">${pred.character}</span>
                        </div>
                        <div class="confidence-text">
                            Confidence: ${pred.confidence}%
                        </div>
                        <div class="bar-container">
                            <div class="bar" style="width:${pred.confidence}%"></div>
                        </div>
                    </div>
                `;
            });

            resultBox.innerHTML = html;

        } catch (error) {
            console.error(error);
            resultBox.innerHTML = '<div class="loading">Frontend API connection error</div>';
        }
    }
</script>

</body>
</html>
