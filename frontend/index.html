<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Character Recognition</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 520px;
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 10px;
            border: none;
        }

        button {
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        img {
            width: 100%;
            margin-top: 20px;
            border-radius: 12px;
            display: none;
        }

        .prediction-card {
            background: #334155;
            padding: 15px;
            margin-top: 15px;
            border-radius: 12px;
            text-align: left;
        }

        #resultBox {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Anime Character Recognition</h1>
    <p>Upload image to get top 3 predictions</p>

    <input type="file" id="imageInput" accept="image/*">
    <button onclick="predictCharacter()">Predict Character</button>

    <img id="preview">
    <div id="resultBox"></div>
</div>

<script>
    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");
    const resultBox = document.getElementById("resultBox");

    imageInput.addEventListener("change", function () {
        const file = this.files[0];
        if (file) {
            preview.src = URL.createObjectURL(file);
            preview.style.display = "block";
        }
    });

    async function predictCharacter() {
        const file = imageInput.files[0];

        if (!file) {
            alert("Please select an image first.");
            return;
        }

        const formData = new FormData();
        formData.append("file", file);

        resultBox.innerHTML = "Predicting...";

        try {
            const response = await fetch("/predict", {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            let html = "<h2>Top 3 Predictions</h2>";

            data.top_predictions.forEach((pred, index) => {
                html += `
                    <div class="prediction-card">
                        <h3>#${index + 1} ${pred.character}</h3>
                        <p>Confidence: ${pred.confidence}%</p>
                    </div>
                `;
            });

            resultBox.innerHTML = html;

        } catch (error) {
            console.error(error);
            resultBox.innerHTML = "Frontend API connection error";
        }
    }
</script>

</body>
</html>
