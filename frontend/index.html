<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Character Recognition</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            color: white;
            min-height: 100vh;
            padding: 30px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: rgba(30, 41, 59, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.35);
        }

        h1 {
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #cbd5e1;
            margin-bottom: 25px;
        }

        input, button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border-radius: 10px;
            border: none;
        }

        button {
            background: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .dashboard {
            display: flex;
            gap: 25px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .preview-panel, .result-panel {
            flex: 1;
            min-width: 300px;
            background: #334155;
            padding: 20px;
            border-radius: 15px;
        }

        .panel-title {
            margin-bottom: 15px;
            font-size: 20px;
            font-weight: bold;
        }

        #preview {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 12px;
            background: #0f172a;
            display: none;
        }

        .prediction-card {
            margin-bottom: 15px;
            padding: 15px;
            background: #475569;
            border-radius: 12px;
        }

        .bar-container {
            width: 100%;
            height: 12px;
            background: #1e293b;
            border-radius: 8px;
            margin-top: 8px;
            overflow: hidden;
        }

        .bar {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border-radius: 8px;
        }

        .loading {
            color: #93c5fd;
            text-align: center;
        }

        .spinner {
            width: 35px;
            height: 35px;
            border: 4px solid #334155;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .confidence-label {
            font-size: 14px;
            color: #cbd5e1;
            margin-top: 6px;
        }

        .history-panel {
            margin-top: 30px;
            background: #334155;
            padding: 20px;
            border-radius: 15px;
        }

        .history-panel h2 {
            margin-top: 0;
        }

        .history-item {
            padding: 12px;
            margin-top: 10px;
            background: #475569;
            border-radius: 10px;
            font-size: 14px;
        }

        .history-empty {
            color: #cbd5e1;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Anime Character Recognition</h1>
    <p class="subtitle">Upload an anime image to view ranked predictions</p>

    <input type="file" id="imageInput" accept="image/*">
    <button onclick="predictCharacter()">Predict Character</button>

    <div class="dashboard">
        <div class="preview-panel">
            <div class="panel-title">Uploaded Image</div>
            <img id="preview" alt="Image Preview">
        </div>

        <div class="result-panel">
            <div class="panel-title">Prediction Results</div>
            <div id="resultBox">Upload image and click predict</div>
        </div>
    </div>

    <div class="history-panel">
        <h2>Recent Predictions</h2>
        <div id="historyBox" class="history-empty">No predictions yet</div>
    </div>
</div>

<script>
    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");
    const resultBox = document.getElementById("resultBox");
    const historyBox = document.getElementById("historyBox");

    let predictionHistory = [];

    imageInput.addEventListener("change", function () {
        const file = this.files[0];

        if (file) {
            preview.src = URL.createObjectURL(file);
            preview.style.display = "block";
        }
    });

    function getConfidenceLabel(value) {
        if (value >= 80) return "Very High";
        if (value >= 60) return "High";
        if (value >= 40) return "Medium";
        return "Low";
    }

    function updateHistory() {
        if (predictionHistory.length === 0) {
            historyBox.innerHTML = "No predictions yet";
            return;
        }

        historyBox.innerHTML = predictionHistory.map(item => `
            <div class="history-item">
                <strong>${item.character}</strong> - ${item.confidence}%<br>
                <small>${item.time}</small>
            </div>
        `).join("");
    }

    async function predictCharacter() {
        const file = imageInput.files[0];

        if (!file) {
            alert("Please select an image first.");
            return;
        }

        const formData = new FormData();
        formData.append("file", file);

        resultBox.innerHTML = `
            <div class="spinner"></div>
            <p class="loading">Analyzing image...</p>
        `;

        try {
            const response = await fetch("/predict", {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            let html = "";

            data.top_predictions.forEach((pred, index) => {
                const label = getConfidenceLabel(pred.confidence);

                html += `
                    <div class="prediction-card">
                        <strong>#${index + 1} ${pred.character}</strong>
                        <p>Confidence: ${pred.confidence}%</p>
                        <div class="confidence-label">
                            Prediction Strength: ${label}
                        </div>
                        <div class="bar-container">
                            <div class="bar" style="width:${pred.confidence}%"></div>
                        </div>
                    </div>
                `;
            });

            resultBox.innerHTML = html;

            const topResult = data.top_predictions[0];

            predictionHistory.unshift({
                character: topResult.character,
                confidence: topResult.confidence,
                time: new Date().toLocaleTimeString()
            });

            if (predictionHistory.length > 5) {
                predictionHistory.pop();
            }

            updateHistory();

        } catch (error) {
            console.error(error);
            resultBox.innerHTML = "Frontend API connection error";
        }
    }
</script>

</body>
</html>
